<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>й›Із«Їй›»еЏ° iframeз‰€</title>

<style>
body{
    font-family: Arial;
    max-width:800px;
    margin:auto;
    background:#f6f6f6;
}

.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

.song{
    display:flex;
    justify-content:space-between;
    padding:8px;
    border-bottom:1px solid #eee;
}

iframe{
    width:100%;
    height:360px;
    border:none;
}
</style>
</head>

<body>

<h2>рџЋ§ й›Із«Їй›»еЏ°пј€з©©е®љ iframeз‰€пј‰</h2>

<div class="card">
    <h3 id="now">жњЄж’­ж”ѕ</h3>

    <!-- рџЋ§ YouTube iframe player -->
    <iframe id="player"
        src=""
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>
</div>

<div class="card">
    <input id="q" placeholder="жђње°‹ж­Њж›І">
    <button onclick="search()">жђње°‹</button>
    <div id="results"></div>
</div>

<script>

let currentVideo = "";

// =====================
// рџ”Ќ жђње°‹
// =====================
async function search(){

    let q = document.getElementById("q").value;

    let res = await fetch("/api/search?q=" + encodeURIComponent(q));
    let data = await res.json();

    let box = document.getElementById("results");
    box.innerHTML = "";

    data.forEach(item => {

        box.innerHTML += `
            <div class="song">
                ${item.title}
                <button onclick="play('${item.id}','${item.title}')">в–¶пёЏ</button>
            </div>
        `;
    });
}


// =====================
// в–¶пёЏ ж’­ж”ѕпј€iframe ж ёеїѓпј‰
// =====================
function play(id,title){

    currentVideo = id;

    document.getElementById("now").innerText =
        "в–¶пёЏ " + title;

    // рџЋЇ YouTube embed
    document.getElementById("player").src =
        `https://www.youtube.com/embed/${id}?autoplay=1`;
}

</script>

</body>
</html>
